<!DOCTYPE html>
<html lang="sv">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CareerCoach AI — Light Mode</title>
    <!-- Vi använder samma typsnitt som stora sajten -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --bg: #f8fafc;
            --text: #1e293b;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        header {
            padding: 1rem;
            background: white;
            border-bottom: 1px solid #e2e8f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-weight: 700;
            color: var(--primary);
        }

        .version-badge {
            font-size: 0.75rem;
            padding: 2px 8px;
            background: #dbeafe;
            border-radius: 99px;
        }

        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            max-width: 800px;
            margin: 0 auto;
            width: 100%;
        }

        .message {
            max-width: 80%;
            padding: 0.75rem 1rem;
            border-radius: 12px;
            line-height: 1.5;
        }

        .bot {
            background: white;
            border: 1px solid #e2e8f0;
            align-self: flex-start;
        }

        .user {
            background: var(--primary);
            color: white;
            align-self: flex-end;
        }

        footer {
            padding: 1rem;
            background: white;
            border-top: 1px solid #e2e8f0;
        }

        .input-area {
            max-width: 800px;
            margin: 0 auto;
            display: flex;
            gap: 0.5rem;
        }

        input {
            flex: 1;
            padding: 0.75rem;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            outline: none;
        }

        input:focus {
            border-color: var(--primary);
        }

        button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <header>
        <div class="logo">CareerCoach AI</div>
        <div class="version-badge">LIGHT MODE v1.0</div>
    </header>

    <main id="chat-container">
        <!-- Här hamnar meddelandena -->
    </main>

    <footer>
        <div class="input-area">
            <input type="text" id="userInput" placeholder="Skriv ditt svar här...">
            <button id="sendBtn">Skicka</button>
        </div>
    </footer>

    <!-- Vi laddar in din befintliga logik -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

    <script src="js/config.js"></script>
    <script src="js/db.js"></script>
    <script src="js/ai.js"></script>

    <script>
        // Minimal chathantering för Light-versionen
        const container = document.getElementById('chat-container');
        const input = document.getElementById('userInput');
        const btn = document.getElementById('sendBtn');

        function addMessage(text, type) {
            const div = document.createElement('div');
            div.className = `message ${type}`;
            div.textContent = text;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        // Starta boten (vi återanvänder din logik från ai.js)
        window.onload = () => {
            addMessage("Hej! Jag är Jobbcoachen (Light). Vi kör på svenska men du kan byta när du vill. Vill du optimera ett CV eller bygga ett nytt?", "bot");
        };

        async function handleSend() {
            const val = input.value.trim();
            if (!val) return;

            addMessage(val, "user");
            input.value = '';

            // Här anropar vi din riktiga AI-funktion
            const response = await sendToGemini(val, []);
            addMessage(response.response, "bot");
        }

        btn.onclick = handleSend;
        input.onkeypress = (e) => { if (e.key === 'Enter') handleSend(); };
    </script>
</body>

</html>
