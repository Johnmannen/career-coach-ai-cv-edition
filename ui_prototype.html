<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Antigravity Studio - Control Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f111a;
            --surface-color: rgba(255, 255, 255, 0.05);
            --surface-blur: blur(12px);
            --border-color: rgba(255, 255, 255, 0.1);
            --accent-primary: #8b5cf6;
            --accent-glow: rgba(139, 92, 246, 0.5);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --success: #10b981;
            --warning: #f59e0b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            min-height: 100vh;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(139, 92, 246, 0.15), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(56, 189, 248, 0.1), transparent 25%);
            background-attachment: fixed;
            padding-bottom: 80px; /* Space for mobile nav */
        }

        header {
            padding: 24px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            background: rgba(15, 17, 26, 0.8);
            backdrop-filter: var(--surface-blur);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-weight: 800;
            font-size: 1.5rem;
            background: linear-gradient(135deg, #f8fafc, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }

        .status-badge {
            font-size: 0.75rem;
            font-weight: 600;
            padding: 6px 12px;
            border-radius: 20px;
            background: rgba(16, 185, 129, 0.1);
            color: var(--success);
            border: 1px solid rgba(16, 185, 129, 0.2);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .status-badge::before {
            content: '';
            width: 6px;
            height: 6px;
            background-color: var(--success);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--success);
        }

        main {
            padding: 20px;
            max-width: 600px;
            margin: 0 auto;
        }

        h2 {
            font-size: 1.25rem;
            margin-bottom: 16px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .card {
            background: var(--surface-color);
            backdrop-filter: var(--surface-blur);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        label {
            font-size: 0.875rem;
            color: var(--text-secondary);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        textarea, input[type="text"] {
            width: 100%;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 16px;
            color: var(--text-primary);
            font-size: 1rem;
            resize: vertical;
            min-height: 100px;
            transition: all 0.3s ease;
        }

        textarea:focus, input[type="text"]:focus {
            outline: none;
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 4px rgba(139, 92, 246, 0.1);
        }

        .btn {
            background: linear-gradient(135deg, var(--accent-primary), #6d28d9);
            color: white;
            border: none;
            padding: 16px 24px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px var(--accent-glow);
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px var(--accent-glow);
        }
        
        .btn.outline {
            background: transparent;
            border: 1px solid var(--border-color);
            box-shadow: none;
            color: var(--text-primary);
        }
        
        .btn.outline:hover {
            border-color: var(--text-secondary);
            background: rgba(255, 255, 255, 0.05);
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 16px;
            margin-top: 20px;
        }

        .gallery-item {
            aspect-ratio: 1;
            border-radius: 16px;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--border-color);
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .gallery-item:hover {
            border-color: var(--accent-primary);
            transform: scale(1.02);
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.6;
            transition: opacity 0.3s ease;
        }
        
        .gallery-item:hover img {
            opacity: 1;
        }

        .gallery-status {
            position: absolute;
            top: 8px;
            right: 8px;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
            padding: 4px 8px;
            border-radius: 8px;
            font-size: 0.7rem;
            font-weight: 600;
        }
        
        .status-pending { color: var(--warning); }
        .status-approved { color: var(--success); }

        /* Floating Mobile Navigation */
        .mobile-nav {
            position: fixed;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: rgba(15, 17, 26, 0.85);
            backdrop-filter: var(--surface-blur);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            display: flex;
            justify-content: space-around;
            padding: 12px;
            z-index: 100;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            max-width: 400px;
            margin: 0 auto;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.75rem;
            font-weight: 600;
            transition: color 0.3s ease;
            width: 60px;
        }
        
        .nav-item.active {
            color: var(--accent-primary);
        }
        
        .nav-icon {
            width: 24px;
            height: 24px;
            background: currentColor;
            mask: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>') no-repeat center;
            -webkit-mask: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>') no-repeat center;
        }

        .nav-icon.video {
            mask: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="23 7 16 12 23 17 23 7"></polygon><rect x="1" y="5" width="15" height="14" rx="2" ry="2"></rect></svg>') no-repeat center;
            -webkit-mask: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="23 7 16 12 23 17 23 7"></polygon><rect x="1" y="5" width="15" height="14" rx="2" ry="2"></rect></svg>') no-repeat center;
        }
        
        .nav-icon.create {
            mask: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>') no-repeat center;
            -webkit-mask: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>') no-repeat center;
        }

    </style>
</head>
<body>

    <header>
        <div class="logo">Vision Engine</div>
        <div class="status-badge">System Online</div>
    </header>

    <main>
        <!-- Create New -->
        <div class="card">
            <h2>New Creative Request</h2>
            <div class="input-group">
                <label for="prompt">Visual Prompt</label>
                <textarea id="prompt" placeholder="Describe the scene in detail... E.g., 'A futuristic chair made of recycled plastic, studio lighting, highly detailed'"></textarea>
                
                <div style="display: flex; gap: 10px; margin-top: 8px;">
                    <button class="btn outline" style="flex: 1;">📝 Use Formula</button>
                    <button class="btn" style="flex: 2;">✨ Generate Image</button>
                </div>
            </div>
        </div>

        <!-- Recent Output -->
        <h2 style="margin-top: 40px;">Recent Generations</h2>
        <div class="gallery">
            <div class="gallery-item">
                <div class="gallery-status status-pending">Pending Review</div>
                <!-- Placeholder for image -->
                <div style="color: var(--text-secondary); text-align: center; padding: 10px; font-size: 0.8rem;">En futuristisk stol av plast...</div>
            </div>
            <div class="gallery-item">
                <div class="gallery-status status-approved">Approved</div>
                <div style="color: var(--text-secondary); text-align: center; padding: 10px; font-size: 0.8rem;">Eco-friendly lamp...</div>
            </div>
        </div>
    </main>

    <!-- Navigation -->
    <nav class="mobile-nav">
        <a href="#" class="nav-item">
            <div class="nav-icon create"></div>
            Create
        </a>
        <a href="#" class="nav-item active">
            <div class="nav-icon"></div>
            Images
        </a>
        <a href="#" class="nav-item">
            <div class="nav-icon video"></div>
            Videos
        </a>
    </nav>

</body>
</html>
