<!DOCTYPE html>
<html class="light" lang="sv"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>CareerCoach AI - Min Profil</title>
<!-- Vercel Web Analytics -->
<script>
  window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
</script>
<script defer src="/_vercel/insights/script.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>
<script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#4F22B2",
                        "background-light": "#F8F9FE",
                        "background-dark": "#0F172A",
                    },
                    fontFamily: {
                        display: ["Inter", "sans-serif"],
                        sans: ["Inter", "sans-serif"],
                    },
                    borderRadius: {
                        DEFAULT: "1rem",
                        'xl': '1.5rem',
                        '2xl': '2rem',
                    },
                },
            },
        };
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        .ios-shadow {
            box-shadow: 0 4px 20px -2px rgba(0, 0, 0, 0.05);
        }
        .active-tab {
            background-color: white;
            color: #4F22B2;
            box-shadow: 0 2px 10px rgba(79, 34, 178, 0.1);
        }
        .dark .active-tab {
            background-color: #1E293B;
            color: #A78BFA;
        }::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #E2E8F0;
            border-radius: 10px;
        }
        .dark ::-webkit-scrollbar-thumb {
            background: #334155;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen pb-20">
<header class="sticky top-0 z-50 bg-white/80 dark:bg-slate-900/80 backdrop-blur-md border-b border-slate-200 dark:border-slate-800 px-6 py-4 flex items-center justify-between">
<div class="flex items-center gap-3">
<div class="bg-primary w-10 h-10 rounded-xl flex items-center justify-center text-white font-bold">C</div>
<div>
<h1 class="text-sm font-bold text-primary leading-tight">CareerCoach</h1>
<p class="text-[10px] text-slate-500 dark:text-slate-400 font-medium">AI-GUIDE</p>
</div>
</div>
<button class="p-2 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-full transition-colors">
<span class="material-icons-round text-slate-600 dark:text-slate-300">notifications_none</span>
</button>
</header>
<main class="max-w-2xl mx-auto px-5 py-8">
<div class="mb-8">
<h2 class="text-3xl font-bold text-primary dark:text-violet-400">Min Profil</h2>
<p class="text-slate-500 dark:text-slate-400 mt-1 text-sm">Hantera din data som vi använder för att bygga dina dokument.</p>
</div>
<nav class="flex overflow-x-auto pb-4 gap-2 mb-8 no-scrollbar scroll-smooth">
<button class="active-tab flex items-center gap-2 px-4 py-3 rounded-2xl whitespace-nowrap text-sm font-semibold transition-all">
<span class="material-icons-round text-[20px]">person_outline</span>
                Personuppgifter
            </button>
<button class="flex items-center gap-2 px-4 py-3 rounded-2xl whitespace-nowrap text-sm font-semibold text-slate-500 dark:text-slate-400 hover:bg-white/50 dark:hover:bg-slate-800 transition-all">
<span class="material-icons-round text-[20px]">work_outline</span>
                Erfarenhet
            </button>
<button class="flex items-center gap-2 px-4 py-3 rounded-2xl whitespace-nowrap text-sm font-semibold text-slate-500 dark:text-slate-400 hover:bg-white/50 dark:hover:bg-slate-800 transition-all">
<span class="material-icons-round text-[20px]">school</span>
                Utbildning
            </button>
<button class="flex items-center gap-2 px-4 py-3 rounded-2xl whitespace-nowrap text-sm font-semibold text-slate-500 dark:text-slate-400 hover:bg-white/50 dark:hover:bg-slate-800 transition-all">
<span class="material-icons-round text-[20px]">verified_user</span>
                Säkerhet
            </button>
</nav>
<section class="bg-white dark:bg-slate-900 rounded-3xl p-6 ios-shadow border border-slate-100 dark:border-slate-800 mb-6">
<div class="mb-6">
<h3 class="text-lg font-bold text-primary dark:text-violet-400">Grundläggande Information</h3>
<p class="text-xs text-slate-500 dark:text-slate-400 mt-0.5">Dessa detaljer kommer att synas högst upp i ditt CV.</p>
</div>
<form class="space-y-5">
<div class="grid grid-cols-2 gap-4">
<div class="space-y-1.5">
<label class="text-xs font-bold text-slate-700 dark:text-slate-300 px-1">Förnamn</label>
<input class="w-full bg-slate-50 dark:bg-slate-800 border-none rounded-2xl px-4 py-3 text-sm focus:ring-2 focus:ring-primary/20 transition-all" type="text" value="Ny"/>
</div>
<div class="space-y-1.5">
<label class="text-xs font-bold text-slate-700 dark:text-slate-300 px-1">Efternamn</label>
<input class="w-full bg-slate-50 dark:bg-slate-800 border-none rounded-2xl px-4 py-3 text-sm focus:ring-2 focus:ring-primary/20 transition-all" type="text" value="Användare"/>
</div>
</div>
<div class="space-y-1.5">
<label class="text-xs font-bold text-slate-700 dark:text-slate-300 px-1">E-post</label>
<input class="w-full bg-slate-50 dark:bg-slate-800 border-none rounded-2xl px-4 py-3 text-sm focus:ring-2 focus:ring-primary/20 transition-all" placeholder="din.epost@exempel.se" type="email"/>
</div>
<div class="grid grid-cols-2 gap-4">
<div class="space-y-1.5">
<label class="text-xs font-bold text-slate-700 dark:text-slate-300 px-1">Telefon</label>
<input class="w-full bg-slate-50 dark:bg-slate-800 border-none rounded-2xl px-4 py-3 text-sm focus:ring-2 focus:ring-primary/20 transition-all" type="tel" value="+46 70 000 00 00"/>
</div>
<div class="space-y-1.5">
<label class="text-xs font-bold text-slate-700 dark:text-slate-300 px-1">Stad</label>
<input class="w-full bg-slate-50 dark:bg-slate-800 border-none rounded-2xl px-4 py-3 text-sm focus:ring-2 focus:ring-primary/20 transition-all" placeholder="Stockholm" type="text"/>
</div>
</div>
<div class="space-y-1.5">
<label class="text-xs font-bold text-slate-700 dark:text-slate-300 px-1">Kort summering (Profiltext)</label>
<textarea class="w-full bg-slate-50 dark:bg-slate-800 border-none rounded-2xl px-4 py-3 text-sm focus:ring-2 focus:ring-primary/20 transition-all resize-none" placeholder="En driven utvecklare med fokus på..." rows="4"></textarea>
</div>
<div class="pt-2">
<button class="w-full bg-primary hover:bg-violet-700 text-white font-bold py-4 rounded-2xl transition-all flex items-center justify-center gap-2 shadow-lg shadow-primary/25" type="submit">
<span class="material-icons-round text-[20px]">save</span>
                        Spara ändringar
                    </button>
</div>
</form>
</section>
<section class="bg-white dark:bg-slate-900 rounded-3xl p-6 ios-shadow border border-slate-100 dark:border-slate-800">
<div class="mb-6">
<h3 class="text-lg font-bold text-primary dark:text-violet-400">Externa Länkar</h3>
<p class="text-xs text-slate-500 dark:text-slate-400 mt-0.5">Länkar till LinkedIn, GitHub eller din portfolio.</p>
</div>
<div class="space-y-4">
<div class="flex items-center gap-3 bg-slate-50 dark:bg-slate-800 p-3 rounded-2xl">
<div class="bg-white dark:bg-slate-700 p-2 rounded-xl shadow-sm">
<span class="material-icons-round text-primary dark:text-violet-400">link</span>
</div>
<input class="flex-1 bg-transparent border-none text-sm focus:ring-0 p-0" placeholder="linkedin.com/in/..." type="text"/>
</div>
<div class="flex items-center gap-3 bg-slate-50 dark:bg-slate-800 p-3 rounded-2xl">
<div class="bg-white dark:bg-slate-700 p-2 rounded-xl shadow-sm">
<span class="material-icons-round text-primary dark:text-violet-400">code</span>
</div>
<input class="flex-1 bg-transparent border-none text-sm focus:ring-0 p-0" placeholder="github.com/..." type="text"/>
</div>
</div>
</section>
</main>
<div class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] max-w-md bg-white/90 dark:bg-slate-900/90 backdrop-blur-xl border border-white/20 dark:border-slate-800/50 rounded-full px-6 py-3 ios-shadow flex items-center justify-between z-50">
<button class="flex flex-col items-center gap-1 text-slate-400 dark:text-slate-500 hover:text-primary transition-colors">
<span class="material-icons-round">home</span>
<span class="text-[10px] font-bold">Hem</span>
</button>
<button class="flex flex-col items-center gap-1 text-slate-400 dark:text-slate-500 hover:text-primary transition-colors">
<span class="material-icons-round">forum</span>
<span class="text-[10px] font-bold">Chat</span>
</button>
<div class="relative -top-8">
<button class="bg-primary w-14 h-14 rounded-full flex items-center justify-center text-white shadow-xl shadow-primary/30 ring-4 ring-background-light dark:ring-background-dark">
<span class="material-icons-round text-3xl">add</span>
</button>
</div>
<button class="flex flex-col items-center gap-1 text-slate-400 dark:text-slate-500 hover:text-primary transition-colors">
<span class="material-icons-round">folder_open</span>
<span class="text-[10px] font-bold">Arkiv</span>
</button>
<button class="flex flex-col items-center gap-1 text-primary dark:text-violet-400">
<span class="material-icons-round">person</span>
<span class="text-[10px] font-bold">Profil</span>
</button>
</div>
<div class="fixed bottom-24 left-6 z-40">
<div class="bg-red-500 text-white px-3 py-1.5 rounded-full flex items-center gap-2 text-xs font-bold shadow-lg animate-pulse">
<span class="flex h-2 w-2 rounded-full bg-white"></span>
            1 Issue
            <button class="ml-1 opacity-60">×</button>
</div>
</div>

</body></html>
